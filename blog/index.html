<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事一覧 | BLOG</title>
    <style>
        body {
            background-color: #0d233a;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            border-bottom: 2px solid #ffffff;
            padding-bottom: 10px;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        /* 記事1件ずつの枠組み */
        .post-item {
            margin-bottom: 35px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.3);
            padding-bottom: 20px;
        }

        .post-date {
            font-size: 0.9rem;
            color: #cccccc;
            margin-bottom: 5px;
        }

        .post-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 5px 0 10px 0;
        }

        .post-title a {
            color: #38ef7d; /* タイトルリンクを目立たせる色（お好みで変更してください） */
            text-decoration: none;
        }

        .post-title a:hover {
            text-decoration: underline;
        }

        .post-summary {
            font-size: 1rem;
            line-height: 1.6;
            color: #e0e0e0;
        }

        .back-home {
            margin-top: 40px;
        }
        .back-home a {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>記事一覧</h1>

        <div class="post-item">
            <div class="post-date">ブログ投稿日時：2026年07月10日</div>
            <div class="post-title">
                <a href="./article1.html">タイトル：*1</a>
            </div>
            <div class="post-summary">一文で内容用要約：やっていき。</div>
        </div>

        <div class="back-home">
            <a href="../index.html">← TOPへ戻る</a>
        </div>
    </div>

</body>
</html>
