<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ただいまじゅんびちゅう</title>
    <style>
        /* 画面全体のデザイン（背景色や上下左右の真ん中寄せ） */
        body {
            background-color: #0d233a; /* 濃い青色 */
            color: #ffffff;           /* 文字の色は白 */
            margin: 0;
            height: 100vh;            /* 画面の高さをいっぱいに使う */
            display: flex;
            justify-content: center;  /* 左右の真ん中に配置 */
            align-items: center;      /* 上下の真ん中に配置 */
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
        }
        /* 工事中文字のデザイン */
        .maintenance-text {
            font-size: 2rem;          /* 文字の大きさ */
            font-weight: bold;        /* ふと文字 */
            text-align: center;       /* 文字の芯を中央に */
            letter-spacing: 0.1em;    /* 文字の間隔 */
        }
    </style>
</head>
<body>

    <div class="maintenance-text">
        <div>ただいまじゅんびちゅう⚒️</div>
