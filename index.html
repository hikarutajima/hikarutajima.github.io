<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>こうじちゅう⚒️</title>
    <style>
        body {
            background-color: #0d233a;
            color: #ffffff;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
        }

        .container {
            text-align: center;
            /* 改修点: スマホ両サイドの余白を設定 */
            padding: 0 20px;
            box-sizing: border-box;
            width: 100%;
            max-width: 600px; /* 横に広がりすぎないよう制限 */
        }

        .maintenance-text {
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 0.1em;
            margin-bottom: 25px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            font-size: 1.1rem;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .nav-links a:hover {
            opacity: 0.7;
        }
    </style>
    <script>
        // ページが読み込まれたら実行
        window.addEventListener('DOMContentLoaded', () => {
            // URLに「?」が含まれているか（パラメーターがあるか）チェック
            if (window.location.search) {
                // パラメーターを除いた本来のURL（https://hikarutajima.org/）を取得
                const cleanURL = window.location.protocol + "//" + window.location.host + window.location.pathname;
                // ブラウザの履歴を更新して、アドレスバーの表示を綺麗にする
                window.history.replaceState({}, document.title, cleanURL);
            }
        });
    </script>
</head>
<body>

    <div class="container">
        <div class="maintenance-text">こうじちゅう ⚒️</div>

        <div class="nav-links">
            <a href="./blog/index.html">BLOG</a>
            <span>|</span> <a href="https://twitter.com/yobai_hompo" target="_blank" rel="noopener" title="X (Twitter)">𝕏</a>
            <a href="https://instagram.com/yobai_hompo" target="_blank" rel="noopener" title="Instagram">📸</a>
            <a href="https://filmarks.com/users/gejio" target="_blank" rel="noopener" title="Filmarks">🎬</a>
        </div>
    </div>

</body>
</html>
